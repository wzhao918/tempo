name: Build Installers

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Which platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            os_name: macos
          - platform: macos-latest
            target: x86_64-apple-darwin
            os_name: macos

    runs-on: ${{ matrix.platform }}
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == matrix.os_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (npm)
        working-directory: app
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: app
          args: --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tempo-${{ matrix.target }}
          path: |
            app/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            app/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            app/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          if-no-files-found: ignore
